<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP Tracker — Ralph & Shaira Wedding</title>
    <link rel="icon" type="image/png" href="images/monogram.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            min-height: 100vh;
        }

        /* ===== LOGIN SCREEN ===== */
        .login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2c3e50, #34495e, #3d566e);
            z-index: 10000;
            padding: 20px;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-card {
            background: #fff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-card h1 {
            font-family: 'Great Vibes', cursive;
            color: #6B9AC4;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .login-card .subtitle {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #8E8E8E;
            margin-bottom: 30px;
        }

        .login-card input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-card input:focus {
            border-color: #6B9AC4;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6B9AC4, #5a89b3);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .login-card button:hover {
            background: linear-gradient(135deg, #5a89b3, #4a7da8);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(107, 154, 196, 0.4);
        }

        .login-error {
            display: none;
            color: #c86464;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .login-error.show {
            display: block;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: #fff;
            padding: 25px 30px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            color: #A7C7E7;
            font-weight: normal;
        }

        .header-title .subtitle {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #6B9AC4;
            color: #fff;
        }

        .btn-primary:hover {
            background: #5a89b3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: #c86464;
            color: #fff;
        }

        .btn-danger:hover {
            background: #b55555;
        }

        .btn-success {
            background: #4CAF50;
            color: #fff;
        }

        .btn-success:hover {
            background: #45a049;
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* ===== STATS CARDS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #6B9AC4;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(107, 154, 196, 0.15);
        }

        .stat-card.accept { border-left-color: #4CAF50; }
        .stat-card.decline { border-left-color: #c86464; }
        .stat-card.pending { border-left-color: #FF9800; }

        .stat-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8E8E8E;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #2c3e50;
            font-weight: 600;
            line-height: 1;
        }

        .stat-card.accept .stat-value { color: #4CAF50; }
        .stat-card.decline .stat-value { color: #c86464; }

        .stat-sub {
            font-size: 0.7rem;
            color: #7E9BB5;
            margin-top: 8px;
        }

        /* ===== FILTERS & SEARCH ===== */
        .toolbar {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: #6B9AC4;
        }

        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8E8E8E;
        }

        .filter-select {
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: inherit;
            background: #fff;
            cursor: pointer;
            outline: none;
        }

        .filter-select:focus {
            border-color: #6B9AC4;
        }

        /* ===== TABLE ===== */
        .table-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        thead {
            background: linear-gradient(135deg, #f5f7fa, #e8ecf1);
        }

        thead th {
            padding: 15px 12px;
            text-align: left;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #2c3e50;
            font-weight: 600;
            border-bottom: 2px solid #6B9AC4;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f9fafc;
        }

        tbody td {
            padding: 14px 12px;
            font-size: 0.85rem;
            color: #2c3e50;
            vertical-align: middle;
        }

        .cell-name {
            font-weight: 600;
        }

        .cell-secondary {
            color: #7E9BB5;
            font-size: 0.8rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .badge-accept {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
        }

        .badge-decline {
            background: rgba(200, 100, 100, 0.1);
            color: #c86464;
        }

        .badge-primary {
            background: rgba(107, 154, 196, 0.1);
            color: #6B9AC4;
        }

        .badge-guest {
            background: rgba(167, 199, 231, 0.15);
            color: #7E9BB5;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
        }

        .action-btn.delete {
            background: rgba(200, 100, 100, 0.1);
            color: #c86464;
        }

        .action-btn.delete:hover {
            background: #c86464;
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8E8E8E;
        }

        .empty-state svg {
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #8E8E8E;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(107, 154, 196, 0.15);
            border-top-color: #6B9AC4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 5000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            border-radius: 16px;
            padding: 35px 30px 30px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            animation: modalSlideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes modalSlideIn {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .modal-icon.danger {
            background: rgba(200, 100, 100, 0.1);
            color: #c86464;
        }

        .modal-icon.info {
            background: rgba(107, 154, 196, 0.1);
            color: #6B9AC4;
        }

        .modal-content h2 {
            font-family: 'Playfair Display', serif;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.35rem;
            font-weight: 500;
        }

        .modal-content > p {
            color: #7E9BB5;
            line-height: 1.6;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }

        /* Additional guests preview list */
        .delete-preview {
            background: #f9fafc;
            border: 1px solid rgba(107, 154, 196, 0.15);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 18px;
            max-height: 180px;
            overflow-y: auto;
        }

        .delete-preview-title {
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #8E8E8E;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .delete-preview ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .delete-preview li {
            padding: 7px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(107, 154, 196, 0.07);
            font-size: 0.85rem;
            color: #2c3e50;
        }

        .delete-preview li:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .delete-preview li .li-icon {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(200, 100, 100, 0.1);
            color: #c86464;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .delete-preview li .li-name {
            flex: 1;
            font-weight: 500;
        }

        .delete-preview li .li-badge {
            font-size: 0.6rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
            background: rgba(200, 100, 100, 0.1);
            color: #c86464;
        }

        /* Warning box */
        .modal-warning {
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 22px;
            font-size: 0.85rem;
            line-height: 1.6;
            display: block; 
        }

        .modal-warning.warning-primary {
            background: rgba(255, 152, 0, 0.08);
            border-left: 3px solid #FF9800;
            color: #bf7a00;
        }

        .modal-warning.warning-single {
            background: rgba(107, 154, 196, 0.08);
            border-left: 3px solid #6B9AC4;
            color: #4a7da8;
        }

        .modal-warning strong {
            font-weight: 600;
        }

        .modal-warning.warning-empty {
            display: none;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-actions .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #6B9AC4, #5a89b3);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 8px 25px rgba(107, 154, 196, 0.4);
            z-index: 6000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: linear-gradient(135deg, #c86464, #b55555);
        }

        .toast.success {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                padding: 20px 15px;
            }

            .header-title h1 {
                font-size: 1.6rem;
            }

            .container {
                padding: 20px 15px;
            }

            .stat-value {
                font-size: 2rem;
            }

            .btn {
                padding: 8px 14px;
                font-size: 0.6rem;
            }

            thead th, tbody td {
                padding: 10px 8px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1>RSVP Tracker</h1>
            <p class="subtitle">Ralph &amp; Shaira</p>
            <form onsubmit="checkLogin(event)">
                <input type="password" id="passwordInput" placeholder="Enter password" required autocomplete="off">
                <button type="submit">Access Dashboard</button>
                <p class="login-error" id="loginError">Incorrect password. Please try again.</p>
            </form>
        </div>
    </div>

    <!-- HEADER -->
    <div class="header">
        <div class="header-title">
            <div>
                <h1>RSVP Tracker</h1>
                <div class="subtitle">Ralph &amp; Shaira Wedding</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="loadData()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
                Refresh
            </button>
            <button class="btn btn-success" onclick="exportCSV()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Export CSV
            </button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="container">

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Total Responses</div>
                <div class="stat-value" id="statTotal">—</div>
                <div class="stat-sub">All submissions</div>
            </div>
            <div class="stat-card accept">
                <div class="stat-label">Accepted</div>
                <div class="stat-value" id="statAccepted">—</div>
                <div class="stat-sub" id="statAcceptedGuests">— total guests</div>
            </div>
            <div class="stat-card decline">
                <div class="stat-label">Declined</div>
                <div class="stat-value" id="statDeclined">—</div>
                <div class="stat-sub">Won't attend</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-label">Total Guests</div>
                <div class="stat-value" id="statTotalGuests">—</div>
                <div class="stat-sub">Attending</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search by name, contact, or code..." oninput="filterTable()">
            </div>

            <select class="filter-select" id="attendanceFilter" onchange="filterTable()">
                <option value="">All Responses</option>
                <option value="Joyfully Accept">✅ Accepted</option>
                <option value="Respectfully Decline">❌ Declined</option>
            </select>

            <select class="filter-select" id="typeFilter" onchange="filterTable()">
                <option value="">All Types</option>
                <option value="Primary Guest">👤 Primary</option>
                <option value="Guest of">➕ Additional</option>
            </select>
        </div>

        <!-- Table -->
        <div class="table-container" id="tableContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading RSVP data...</p>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon"></div>
            <h2 id="modalTitle">Confirm Deletion</h2>
            <p id="deleteMessage"></p>

            <!-- Only shown for Primary with additional guests -->
            <div class="delete-preview" id="deletePreview" style="display:none;">
                <p class="delete-preview-title">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                        <path d="M16 3.13a4 4 0 010 7.75"/>
                    </svg>
                    The following will also be removed:
                </p>
                <ul id="deletePreviewList"></ul>
            </div>

            <div class="modal-warning" id="modalWarning"></div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    Confirm Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const ADMIN_PASSWORD = 'Shairalph@07';  
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-Es0WJ0DcudZcqVKV_PTt-GeeB7HrdcD1joP_YpBD0hNgY6-U5jKrGr66xABNngP3/exec';

        var allRsvpData = [];
        var deleteTargetIndex = null;

        // ===== LOGIN =====
        function checkLogin(e) {
            e.preventDefault();
            var password = document.getElementById('passwordInput').value;
            var errorEl = document.getElementById('loginError');

            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden');
                sessionStorage.setItem('rsvp_admin_auth', 'true');
                loadData();
            } else {
                errorEl.classList.add('show');
                document.getElementById('passwordInput').value = '';
                setTimeout(function() { errorEl.classList.remove('show'); }, 3000);
            }
        }

        // Check if already logged in
        if (sessionStorage.getItem('rsvp_admin_auth') === 'true') {
            document.getElementById('loginScreen').classList.add('hidden');
            document.addEventListener('DOMContentLoaded', loadData);
        }

        // ===== LOAD DATA FROM GOOGLE SHEET =====
        function loadData() {
            var container = document.getElementById('tableContainer');
            container.innerHTML =
                '<div class="loading">' +
                    '<div class="loading-spinner"></div>' +
                    '<p>Loading RSVP data...</p>' +
                '</div>';

            fetch(GOOGLE_SCRIPT_URL + '?action=list', { method: 'GET' })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (result.status === 'success') {
                        allRsvpData = result.data || [];
                        updateStats();
                        renderTable(allRsvpData);
                    } else {
                        showToast('Error loading data: ' + (result.message || 'Unknown error'), 'error');
                    }
                })
                .catch(function(err) {
                    console.error('Fetch error:', err);
                    showToast('Failed to connect to server', 'error');
                    container.innerHTML =
                        '<div class="empty-state">' +
                            '<p>❌ Failed to load data.</p>' +
                            '<p style="margin-top:10px;font-size:0.8rem;">Check console for details.</p>' +
                        '</div>';
                });
        }

        // ===== UPDATE STATS =====
        function updateStats() {
            var primaryOnly = allRsvpData.filter(function(row) {
                return row.type === 'Primary Guest';
            });

            var accepted = primaryOnly.filter(function(r) { return r.attendance === 'Joyfully Accept'; });
            var declined = primaryOnly.filter(function(r) { return r.attendance === 'Respectfully Decline'; });

            var totalGuests = 0;
            accepted.forEach(function(r) {
                totalGuests += parseInt(r.totalGuests) || 1;
            });

            document.getElementById('statTotal').textContent = primaryOnly.length;
            document.getElementById('statAccepted').textContent = accepted.length;
            document.getElementById('statAcceptedGuests').textContent = totalGuests + ' total guests';
            document.getElementById('statDeclined').textContent = declined.length;
            document.getElementById('statTotalGuests').textContent = totalGuests;
        }

        // ===== RENDER TABLE =====
        function renderTable(data) {
            var container = document.getElementById('tableContainer');

            if (data.length === 0) {
                container.innerHTML =
                    '<div class="empty-state">' +
                        '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                            '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>' +
                            '<polyline points="22,6 12,13 2,6"/>' +
                        '</svg>' +
                        '<p>No RSVPs found</p>' +
                    '</div>';
                return;
            }

            var html = '<table><thead><tr>' +
                '<th>#</th>' +
                '<th>Timestamp</th>' +
                '<th>Name</th>' +
                '<th>Contact</th>' +
                '<th>Attendance</th>' +
                '<th>Guests</th>' +
                '<th>Type</th>' +
                '<th>Invite Code</th>' +
                '<th>Message</th>' +
                '<th>Actions</th>' +
            '</tr></thead><tbody>';

            data.forEach(function(row, index) {
                var isAccepted = row.attendance === 'Joyfully Accept';
                var isPrimary = row.type === 'Primary Guest';

                html += '<tr>';
                html += '<td class="cell-secondary">' + (row.rowIndex || (index + 2)) + '</td>';
                html += '<td class="cell-secondary">' + escapeHTML(row.timestamp || '') + '</td>';
                html += '<td class="cell-name">' + escapeHTML(row.name || '') + '</td>';
                html += '<td class="cell-secondary">' + escapeHTML(row.contact || '—') + '</td>';
                html += '<td><span class="badge ' + (isAccepted ? 'badge-accept' : 'badge-decline') + '">' +
                        (isAccepted ? '✓ Accept' : '✕ Decline') + '</span></td>';
                html += '<td>' + (row.totalGuests || '—') + '</td>';
                html += '<td><span class="badge ' + (isPrimary ? 'badge-primary' : 'badge-guest') + '">' +
                        escapeHTML(row.type || '') + '</span></td>';
                html += '<td class="cell-secondary">' + escapeHTML(row.inviteCode || '—') + '</td>';
                html += '<td class="cell-secondary" style="max-width:200px;">' +
                        escapeHTML((row.message || '').substring(0, 60)) +
                        ((row.message || '').length > 60 ? '...' : '') + '</td>';
                html += '<td>' +
                        '<button class="action-btn delete" onclick="openDeleteModal(' + index + ')">' +
                            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                                '<polyline points="3 6 5 6 21 6"/>' +
                                '<path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>' +
                            '</svg>' +
                            'Remove' +
                        '</button>' +
                        '</td>';
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // ===== FILTER =====
        function filterTable() {
            var search = document.getElementById('searchInput').value.toLowerCase();
            var attendance = document.getElementById('attendanceFilter').value;
            var type = document.getElementById('typeFilter').value;

            var filtered = allRsvpData.filter(function(row) {
                var matchSearch = !search ||
                    (row.name || '').toLowerCase().includes(search) ||
                    (row.contact || '').toLowerCase().includes(search) ||
                    (row.inviteCode || '').toLowerCase().includes(search);

                var matchAttendance = !attendance || row.attendance === attendance;

                var matchType = !type ||
                    (type === 'Primary Guest' && row.type === 'Primary Guest') ||
                    (type === 'Guest of' && (row.type || '').startsWith('Guest of'));

                return matchSearch && matchAttendance && matchType;
            });

            renderTable(filtered);
        }

        // ===== DELETE LOGIC =====
        var deleteTargetIndex = null;
        var deleteModeTarget = 'single'; // 'primary' or 'single'

        function openDeleteModal(index) {
            deleteTargetIndex = index;
            var row = allRsvpData[index];
            var isPrimary = row.type === 'Primary Guest';

            // Set icon
            var iconEl = document.getElementById('modalIcon');
            iconEl.className = 'modal-icon danger';
            iconEl.innerHTML =
                '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                    '<polyline points="3 6 5 6 21 6"/>' +
                    '<path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>' +
                '</svg>';

            var previewEl = document.getElementById('deletePreview');
            var previewList = document.getElementById('deletePreviewList');
            var warningEl = document.getElementById('modalWarning');
            var titleEl = document.getElementById('modalTitle');
            var msgEl = document.getElementById('deleteMessage');
            var confirmBtn = document.getElementById('confirmDeleteBtn');

            if (isPrimary) {
                // PRIMARY GUEST — find their additional guests
                deleteModeTarget = 'primary';

                var additionalGuests = allRsvpData.filter(function(r) {
                    return r.type === 'Guest of ' + row.name;
                });

                titleEl.textContent = 'Remove Primary Guest';
                msgEl.textContent = 'You are about to remove "' + row.name + '" from the RSVP list.';

                // Show additional guests if any
                if (additionalGuests.length > 0) {
                    previewEl.style.display = 'block';
                    previewList.innerHTML = additionalGuests.map(function(g) {
                        return '<li>' +
                            '<span class="li-icon">' +
                                '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                                    '<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>' +
                                    '<circle cx="12" cy="7" r="4"/>' +
                                '</svg>' +
                            '</span>' +
                            '<span class="li-name">' + escapeHTML(g.name) + '</span>' +
                            '<span class="li-badge">Will be removed</span>' +
                        '</li>';
                    }).join('');

                    warningEl.className = 'modal-warning warning-primary';
                    warningEl.innerHTML =
                        '⚠️ ' + additionalGuests.length + ' additional guest' +
                        (additionalGuests.length > 1 ? 's' : '') +
                        ' will also be removed, and the invite link will be reset.';
                } else {
                    previewEl.style.display = 'none';
                    warningEl.className = 'modal-warning warning-primary';
                    warningEl.innerHTML = '⚠️ This action will reset the invite link, allowing them to resubmit.';
                }

                confirmBtn.innerHTML =
                    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                        '<polyline points="3 6 5 6 21 6"/>' +
                        '<path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>' +
                    '</svg>' +
                    (additionalGuests.length > 0 ? 'Remove All' : 'Remove Guest');

            } else {
                // ADDITIONAL GUEST ONLY
                deleteModeTarget = 'single';

                titleEl.textContent = 'Remove Additional Guest';
                msgEl.textContent = 'You are about to remove "' + row.name + '" from the guest list.';

                previewEl.style.display = 'none';
                warningEl.className = 'modal-warning warning-single';
                warningEl.innerHTML = 'ℹ️ Only this guest will be removed. The invite link will <strong>not</strong> be reset.';

                confirmBtn.innerHTML =
                    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                        '<polyline points="3 6 5 6 21 6"/>' +
                        '<path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>' +
                    '</svg>Remove Guest';
            }

            document.getElementById('deleteModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('deleteModal').classList.remove('active');
            deleteTargetIndex = null;
            deleteModeTarget = 'single';
        }

        function confirmDelete() {
            if (deleteTargetIndex === null) return;

            var row = allRsvpData[deleteTargetIndex];
            var confirmBtn = document.getElementById('confirmDeleteBtn');
            confirmBtn.innerHTML = '<div style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;"></div> Deleting...';
            confirmBtn.disabled = true;

            var payload = {
                action: 'delete',
                rowIndex: row.rowIndex,
                inviteHash: row.inviteHash || '',
                name: row.name,
                type: row.type,
                deleteMode: deleteModeTarget
            };

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(function() {
                var msg = deleteModeTarget === 'primary'
                    ? '✓ Primary guest and related entries removed'
                    : '✓ Additional guest removed';
                showToast(msg, 'success');
                closeModal();
                setTimeout(loadData, 600);
            })
            .catch(function(err) {
                showToast('Failed to delete: ' + err.message, 'error');
            })
            .finally(function() {
                confirmBtn.disabled = false;
            });
        }

        // ===== EXPORT CSV =====
        function exportCSV() {
            if (allRsvpData.length === 0) {
                showToast('No data to export', 'error');
                return;
            }

            var headers = ['Timestamp', 'Name', 'Contact', 'Attendance', 'Message', 'Total Guests', 'Type', 'Invite Code'];
            var csv = headers.join(',') + '\n';

            allRsvpData.forEach(function(row) {
                var values = [
                    escapeCsv(row.timestamp),
                    escapeCsv(row.name),
                    escapeCsv(row.contact),
                    escapeCsv(row.attendance),
                    escapeCsv(row.message),
                    escapeCsv(row.totalGuests),
                    escapeCsv(row.type),
                    escapeCsv(row.inviteCode)
                ];
                csv += values.join(',') + '\n';
            });

            var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'RSVP_Ralph_Shaira_' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
            URL.revokeObjectURL(url);

            showToast('✓ CSV exported successfully', 'success');
        }

        function escapeCsv(value) {
            if (value === null || value === undefined) return '';
            var str = String(value);
            if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                return '"' + str.replace(/"/g, '""') + '"';
            }
            return str;
        }

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"']/g, function(c) {
                return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
            });
        }

        // ===== TOAST =====
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + (type || '');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }

        // Close modal on backdrop click
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
